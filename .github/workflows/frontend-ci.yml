name: Frontend CI

on:
  push:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/frontend-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and Astro validation
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build
